services:
  postgres:
    image: postgres:16-alpine
    container_name: beatsify-postgres
    environment:
      POSTGRES_DB: beatsify
      POSTGRES_USER: beatsify
      POSTGRES_PASSWORD: beatsify
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beatsify -d beatsify"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

