spring:
  application:
    name: beatsify-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/beatsify}
    username: ${DATABASE_USERNAME:beatsify}
    password: ${DATABASE_PASSWORD:beatsify}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}

beatsify:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

